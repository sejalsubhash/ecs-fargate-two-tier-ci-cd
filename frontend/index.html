<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two-Tier App | AWS ECS Deployment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1f2e, #252b3b);
      border-bottom: 1px solid #2d3748;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.3rem; font-weight: 600; color: #63b3ed; }
    .badge {
      font-size: 11px; padding: 3px 8px;
      background: #2d3748; color: #68d391;
      border-radius: 12px; border: 1px solid #38a169;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 40px 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 24px;
    }
    .card h2 { font-size: 0.85rem; color: #718096; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .status-dot.green { background: #68d391; box-shadow: 0 0 6px #68d391; }
    .status-dot.red { background: #fc8181; }
    .status-dot.yellow { background: #f6e05e; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d3748; }
    .stat:last-child { border-bottom: none; }
    .stat label { color: #718096; font-size: 0.9rem; }
    .stat value { color: #e2e8f0; font-family: monospace; font-size: 0.9rem; }
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th { text-align: left; padding: 10px 12px; color: #718096; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #2d3748; }
    .items-table td { padding: 12px; border-bottom: 1px solid #1e2535; font-size: 0.9rem; }
    .items-table tr:hover td { background: #1e2535; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; }
    .tag.electronics { background: #2a4365; color: #90cdf4; }
    .tag.clothing    { background: #44337a; color: #d6bcfa; }
    .tag.books       { background: #276749; color: #9ae6b4; }
    .arch-diagram {
      background: #1a1f2e; border: 1px solid #2d3748;
      border-radius: 12px; padding: 24px; margin-top: 8px;
    }
    .arch-diagram h2 { font-size: 0.85rem; color: #718096; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }
    .arch-row { display: flex; align-items: center; justify-content: center; gap: 0; flex-wrap: wrap; }
    .arch-box {
      background: #6367FF; border: 1px solid #3d4a63;
      border-radius: 8px; padding: 12px 18px; text-align: center; min-width: 110px;
    }
    .arch-box .icon { font-size: 1.4rem; margin-bottom: 4px; }
    .arch-box .label { font-size: 0.75rem; color: #a0aec0; }
    .arch-box .sublabel { font-size: 0.65rem; color: #4a5568; margin-top: 2px; }
    .arch-arrow { color: #4a5568; font-size: 1.2rem; padding: 0 6px; }
    .error-msg { color: #fc8181; font-size: 0.85rem; margin-top: 8px; }
    .refresh-btn {
      background: #2b6cb0; color: white; border: none; padding: 8px 16px;
      border-radius: 8px; cursor: pointer; font-size: 0.85rem; margin-top: 16px;
    }
    .refresh-btn:hover { background: #3182ce; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Two-Tier App</h1>
    <span class="badge">AWS ECS + Fargate</span>
    <span id="connection-badge" class="badge" style="background:#2d3748;color:#f6e05e;border-color:#d69e2e;">Connecting...</span>
  </header>

  <div class="container">
    <div class="grid">
      <!-- Backend Status Card -->
      <div class="card">
        <h2>Backend API Status</h2>
        <div id="api-status">
          <div class="stat"><label>Status</label><value><span class="status-dot yellow"></span>Loading...</value></div>
        </div>
        <div id="api-error" class="error-msg" style="display:none"></div>
        <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      </div>

      <!-- Architecture Card -->
      <div class="card">
        <h2>Architecture</h2>
        <div class="arch-row">
          <div class="arch-box"><div class="icon">🌐</div><div class="label">Browser</div><div class="sublabel">User</div></div>
          <div class="arch-arrow">→</div>
          <div class="arch-box"><div class="icon">⚖️</div><div class="label">ALB</div><div class="sublabel">Load Balancer</div></div>
          <div class="arch-arrow">→</div>
          <div class="arch-box"><div class="icon">📦</div><div class="label">Frontend</div><div class="sublabel">Nginx/ECS</div></div>
          <div class="arch-arrow">→</div>
          <div class="arch-box"><div class="icon">⚙️</div><div class="label">Backend</div><div class="sublabel">Node/ECS</div></div>
        </div>
      </div>
    </div>

    <!-- Products Table -->
    <div class="card">
      <h2>Products from Backend API</h2>
      <div id="items-container">
        <p style="color:#718096;font-size:0.9rem">Loading items...</p>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = window.BACKEND_URL || '/api';

    async function loadStatus() {
      try {
        const res = await fetch(`${BACKEND_URL}/status`);
        const data = await res.json();
        document.getElementById('api-status').innerHTML = `
          <div class="stat"><label>Service</label><value>${data.service}</value></div>
          <div class="stat"><label>Version</label><value>${data.version}</value></div>
          <div class="stat"><label>Environment</label><value>${data.environment}</value></div>
          <div class="stat"><label>Region</label><value>${data.region}</value></div>
          <div class="stat"><label>Uptime</label><value>${Math.floor(data.uptime)}s</value></div>
          <div class="stat"><label>Health</label><value><span class="status-dot green"></span>Connected</value></div>
        `;
        document.getElementById('connection-badge').textContent = '✓ Connected';
        document.getElementById('connection-badge').style.cssText = 'background:#276749;color:#9ae6b4;border-color:#38a169;font-size:11px;padding:3px 8px;border-radius:12px;border:1px solid';
      } catch(e) {
        document.getElementById('api-status').innerHTML = `<div class="stat"><label>Status</label><value><span class="status-dot red"></span>Offline</value></div>`;
        document.getElementById('api-error').style.display = 'block';
        document.getElementById('api-error').textContent = `Cannot reach backend: ${e.message}`;
        document.getElementById('connection-badge').textContent = '✗ Disconnected';
        document.getElementById('connection-badge').style.cssText = 'background:#742a2a;color:#fc8181;border-color:#c53030;font-size:11px;padding:3px 8px;border-radius:12px;border:1px solid';
      }
    }

    async function loadItems() {
      try {
        const res = await fetch(`${BACKEND_URL}/items`);
        const data = await res.json();
        const tagClass = { Electronics:'electronics', Clothing:'clothing', Books:'books' };
        document.getElementById('items-container').innerHTML = `
          <table class="items-table">
            <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Category</th></tr></thead>
            <tbody>
              ${data.items.map(i => `
                <tr>
                  <td style="color:#718096">#${i.id}</td>
                  <td>${i.name}</td>
                  <td style="color:#68d391">$${i.price.toFixed(2)}</td>
                  <td><span class="tag ${(tagClass[i.category]||'').toLowerCase()}">${i.category}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
          <p style="color:#4a5568;font-size:0.75rem;margin-top:12px">Total: ${data.total} items | Env: ${data.env}</p>
        `;
      } catch(e) {
        document.getElementById('items-container').innerHTML = `<p class="error-msg">Failed to load items: ${e.message}</p>`;
      }
    }

    function loadAll() { loadStatus(); loadItems(); }
    loadAll();
  </script>
</body>
</html>
