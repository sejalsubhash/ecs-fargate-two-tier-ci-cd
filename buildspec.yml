version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-2"
  exported-variables:
    - FRONTEND_URI
    - BACKEND_URI
    - IMAGE_TAG

phases:
  pre_build:
    commands:
      - echo "=== Environment Check ==="
      - echo "Account  = $AWS_ACCOUNT_ID"
      - echo "Region   = $AWS_DEFAULT_REGION"

      - echo "=== Logging in to Amazon ECR Private ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

      - echo "=== Logging in to Amazon ECR Public (to avoid Docker Hub rate limit) ==="
      - aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - echo "=== Setting image URIs ==="
      - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - export FRONTEND_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$FRONTEND_REPO_NAME
      - export BACKEND_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$BACKEND_REPO_NAME

      - echo "Frontend URI = $FRONTEND_URI"
      - echo "Backend URI  = $BACKEND_URI"
      - echo "Image Tag    = $IMAGE_TAG"

  build:
    commands:
      - echo "=== Building Backend Image ==="
      - docker build -t $BACKEND_URI:latest -t $BACKEND_URI:$IMAGE_TAG ./backend
      - echo "Backend image built successfully"

      - echo "=== Building Frontend Image ==="
      - docker build -t $FRONTEND_URI:latest -t $FRONTEND_URI:$IMAGE_TAG ./frontend
      - echo "Frontend image built successfully"

      - echo "=== Verifying images exist locally ==="
      - docker images | grep $AWS_ACCOUNT_ID

post_build:
  commands:
    - echo "=== Pushing Backend to ECR ==="
    - docker push $BACKEND_URI:latest
    - docker push $BACKEND_URI:$IMAGE_TAG

    - echo "=== Pushing Frontend to ECR ==="
    - docker push $FRONTEND_URI:latest
    - docker push $FRONTEND_URI:$IMAGE_TAG

    - echo "=== Updating Backend Task Definition ==="
    - BACKEND_TASK_JSON=$(aws ecs describe-task-definition --task-definition $BACKEND_TASK_DEF --query 'taskDefinition')
    - NEW_BACKEND_TASK=$(echo $BACKEND_TASK_JSON | python3 -c "import json,sys; td=json.load(sys.stdin); td['containerDefinitions'][0]['image']='$BACKEND_URI:$IMAGE_TAG'; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))")
    - aws ecs register-task-definition --cli-input-json "$NEW_BACKEND_TASK"

    - echo "=== Updating Frontend Task Definition ==="
    - FRONTEND_TASK_JSON=$(aws ecs describe-task-definition --task-definition $FRONTEND_TASK_DEF --query 'taskDefinition')
    - NEW_FRONTEND_TASK=$(echo $FRONTEND_TASK_JSON | python3 -c "import json,sys; td=json.load(sys.stdin); td['containerDefinitions'][0]['image']='$FRONTEND_URI:$IMAGE_TAG'; [td.pop(k,None) for k in ['taskDefinitionArn','revision','status','requiresAttributes','compatibilities','registeredAt','registeredBy']]; print(json.dumps(td))")
    - aws ecs register-task-definition --cli-input-json "$NEW_FRONTEND_TASK"

    - echo "=== Generating separate imagedefinitions files ==="
    - printf '[{"name":"backend","imageUri":"%s"}]' $BACKEND_URI:$IMAGE_TAG > imagedefinitions_backend.json
    - printf '[{"name":"frontend","imageUri":"%s"}]' $FRONTEND_URI:$IMAGE_TAG > imagedefinitions_frontend.json

    - echo "Backend imagedefinitions:"
    - cat imagedefinitions_backend.json
    - echo "Frontend imagedefinitions:"
    - cat imagedefinitions_frontend.json

artifacts:
  files:
    - imagedefinitions_backend.json
    - imagedefinitions_frontend.json
  discard-paths: yes

