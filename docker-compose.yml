services:
  backend:
    build: ./backend
    container_name: two-tier-backend
    environment:
      - NODE_ENV=development
      - PORT=5000
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: two-tier-frontend
    environment:
      - BACKEND_HOST=backend
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  default:
    name: two-tier-network