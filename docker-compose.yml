version: '3.8'

services:
  backend:
    build: ./backend
    container_name: two-tier-backend
    environment:
      - NODE_ENV=development
      - PORT=5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: two-tier-frontend
    environment:
      - BACKEND_HOST=backend    # Docker service name resolves as DNS
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  default:
    name: two-tier-network